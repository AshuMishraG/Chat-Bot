<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Home Cards Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: "Google Sans", Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .admin-container {
      background: #fff;
      margin-top: 3rem;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      padding: 2.5rem 2rem 2rem 2rem;
      max-width: 700px;
      width: 100%;
    }

    h1 {
      margin-bottom: 2rem;
      font-size: 2rem;
      font-weight: 600;
      color: #222;
      text-align: center;
    }

    table {
      border-collapse: separate;
      border-spacing: 0 1rem;
      width: 100%;
      margin-bottom: 1.5rem;
      table-layout: fixed;
    }

    th,
    td {
      padding: 0.9rem 0.7rem;
      background: #fff;
      border: none;
      font-size: 1rem;
    }

    th {
      color: #5f6368;
      font-weight: 500;
      background: #f5f6fa;
      border-bottom: 2px solid #e0e0e0;
    }

    th.id-col,
    td.id-col {
      width: 60px;
      min-width: 40px;
      max-width: 80px;
      text-align: center;
    }

    th.title-col,
    td.title-col {
      width: 25%;
      min-width: 120px;
    }

    th.prompt-col,
    td.prompt-col {
      width: 35%;
      min-width: 180px;
    }

    th.status-col,
    td.status-col {
      width: 15%;
      min-width: 100px;
      text-align: center;
    }

    th.delete-col,
    td.delete-col {
      width: 10%;
      min-width: 80px;
      text-align: center;
    }

    tr.card-row {
      box-shadow: 0 1px 4px rgba(26, 115, 232, 0.07);
      border-radius: 14px;
      background: #fff;
      transition: box-shadow 0.2s;
    }

    tr.card-row:hover {
      box-shadow: 0 4px 16px rgba(26, 115, 232, 0.13);
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      background: #f8f9fa;
      transition: border 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border: 1.5px solid #1a73e8;
      outline: none;
      background: #fff;
    }

    .add-row,
    .submit-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.7rem;
      font-size: 1rem;
      font-weight: 500;
      margin-right: 1rem;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(26, 115, 232, 0.08);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .add-row:hover,
    .submit-btn:hover {
      background: #185abc;
      box-shadow: 0 2px 8px rgba(26, 115, 232, 0.13);
    }

    .status-toggle {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
      background: #ccc;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .status-toggle.active {
      background: #1a73e8;
    }

    .status-toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .status-toggle.active::after {
      transform: translateX(26px);
    }

    .status-label {
      font-size: 0.85rem;
      color: #5f6368;
      margin-top: 0.3rem;
      display: block;
    }

    .delete-btn {
      color: #fff;
      background: #d93025;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .delete-btn:hover {
      background: #b52b27;
    }

    #status {
      margin-top: 1rem;
      font-size: 1.1rem;
      text-align: center;
      color: #1a73e8;
      min-height: 1.5em;
    }

    @media (max-width: 800px) {
      .admin-container {
        padding: 1rem;
      }

      table {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="admin-container">
    <h1>Home Cards Admin</h1>
    <form id="cards-form" onsubmit="return false;">
      <table>
        <thead>
          <tr>
            <th class="id-col">#</th>
            <th class="title-col">Title</th>
            <th class="prompt-col">Prompt</th>
            <th class="status-col">Available</th>
            <th class="delete-col">Delete</th>
          </tr>
        </thead>
        <tbody id="cards-table-body">
          <!-- Cards will be loaded here -->
        </tbody>
      </table>
      <button type="button" class="add-row" onclick="addRow()">
        Add Card
      </button>
      <button type="submit" class="submit-btn" onclick="saveCards()">
        Save Changes
      </button>
    </form>
    <div id="status"></div>
  </div>
  <script>
    async function fetchCards() {
      const res = await fetch("/api/home-cards");
      return await res.json();
    }

    function renderCards(cards) {
      const tbody = document.getElementById("cards-table-body");
      tbody.innerHTML = "";
      cards.forEach((card, idx) => {
        const row = document.createElement("tr");
        row.className = "card-row";
        row.innerHTML = `
            <td class="id-col">${idx + 1}</td>
            <td class="title-col"><input type="text" value="${card.title
          }" onchange="updateCard(${idx}, 'title', this.value)"></td>
            <td class="prompt-col"><input type="text" value="${card.prompt
          }" onchange="updateCard(${idx}, 'prompt', this.value)"></td>
            <td class="status-col">
              <div class="status-toggle ${card.status === "online" ? "active" : ""
          }" onclick="toggleStatus(${idx})"></div>
              <span class="status-label">${card.status === "online" ? "Online" : "Offline"
          }</span>
            </td>
            <td class="delete-col">
              <button type="button" class="delete-btn" onclick="deleteRow(${idx})">Delete</button>
            </td>
          `;
        tbody.appendChild(row);
      });
    }

    let cardsData = [];

    function updateCard(idx, field, value) {
      cardsData[idx][field] = value;
    }

    function addRow() {
      cardsData.push({ title: "", prompt: "", status: "online" });
      renderCards(cardsData);
    }

    function toggleStatus(idx) {
      cardsData[idx].status =
        cardsData[idx].status === "online" ? "offline" : "online";
      renderCards(cardsData);
    }

    function deleteRow(idx) {
      cardsData.splice(idx, 1);
      renderCards(cardsData);
    }

    async function saveCards() {
      // Remove empty cards
      const validCards = cardsData.filter(
        (card) => card.title.trim() && card.prompt.trim()
      );
      const res = await fetch("/api/home-cards", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(validCards),
      });
      if (res.ok) {
        document.getElementById("status").textContent = "Saved successfully!";
        cardsData = await res.json();
        renderCards(cardsData);
      } else {
        document.getElementById("status").textContent = "Failed to save.";
      }
    }

    // Initial load
    fetchCards().then((cards) => {
      cardsData = cards;
      renderCards(cardsData);
    });

    // Expose functions globally for inline event handlers
    window.updateCard = updateCard;
    window.addRow = addRow;
    window.toggleStatus = toggleStatus;
    window.deleteRow = deleteRow;
    window.saveCards = saveCards;
  </script>
</body>

</html>
